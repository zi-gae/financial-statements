name: Fetch Financial Data

on:
  workflow_dispatch:
    inputs:
      year:
        description: "수집할 연도 (예: 2024). 비워두면 최근 4분기 + 전년 동기 자동 수집"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.calc.outputs.matrix }}
    steps:
      - name: Calculate recent quarters
        id: calc
        run: |
          node -e "
          const now = new Date();
          const year = now.getFullYear();
          const month = now.getMonth() + 1;
          const currentQuarter = Math.ceil(month / 3);

          const inputYear = '${{ inputs.year }}';
          let quarters;

          if (inputYear) {
            quarters = ['Q1','Q2','Q3','Q4'].map(quarter => ({ year: inputYear, quarter }));
          } else {
            const recent = [];
            let q = currentQuarter - 1;
            let y = year;
            for (let i = 0; i < 4; i++) {
              if (q <= 0) { q = 4; y--; }
              recent.push({ year: String(y), quarter: 'Q' + q });
              q--;
            }
            const seen = new Set();
            quarters = recent.flatMap(({ year, quarter }) => [
              { year, quarter },
              { year: String(Number(year) - 1), quarter },
            ]).filter(({ year, quarter }) => {
              const key = year + '_' + quarter;
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            });
          }

          const include = [];
          for (const { year, quarter } of quarters) {
            for (const fsDiv of ['CFS', 'OFS']) {
              include.push({ year, quarter, fsDiv });
            }
          }

          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'matrix=' + JSON.stringify({ include }) + '\n');
          "

  fetch:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false
      max-parallel: 4

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch financial data
        env:
          DART_API_KEY1: ${{ secrets.DART_API_KEY1 }}
          DART_API_KEY2: ${{ secrets.DART_API_KEY2 }}
          DART_API_KEY3: ${{ secrets.DART_API_KEY3 }}
          TARGET_YEAR: ${{ matrix.year }}
          TARGET_QUARTER: ${{ matrix.quarter }}
          TARGET_FS_DIV: ${{ matrix.fsDiv }}
        run: node scripts/fetch-financial-data.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-${{ matrix.year }}-${{ matrix.quarter }}-${{ matrix.fsDiv }}
          path: public/data/${{ matrix.year }}_${{ matrix.quarter }}_${{ matrix.fsDiv }}.json

  commit:
    needs: fetch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: public/data/
          merge-multiple: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: 재무데이터 업데이트 $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
